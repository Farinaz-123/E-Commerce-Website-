<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">

<h2>Your Cart</h2>

<table>
<tr>
    <th>Product</th>
    <th>Price</th>
    <th>Action</th>
</tr>

{% for item in items %}
<tr>
    <td>{{ item.name }}</td>
    <td>₹{{ item.price }}</td>
    <td><a href="/remove/{{ item.id }}">Remove</a></td>
</tr>
{% endfor %}
</table>

<h3>Total: ₹{{ total }}</h3>

</div>
</body>
</html>
