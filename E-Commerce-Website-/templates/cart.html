<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Your Cart</h2>

    <div>
        <a href="/products">Products</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- CART ITEMS -->
<div class="table-container">

    {% if items %}
        <table class="cart-table">
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Action</th>
            </tr>

            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>₹ {{ item.price }}</td>
                <td>
                    <a href="/remove/{{ item.id }}" class="btn-danger">
                        Remove
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>

        <div class="cart-summary">
            <h3>Cart Total: ₹ {{ total }}</h3>
            <form action="/checkout" method="POST">
                <button type="submit" class="checkout-btn">Checkout with Stripe</button>
            </form>
        </div>
        
    {% else %}
        <p class="empty">Your cart is empty</p>
    {% endif %}

</div>

</body>
</html>
